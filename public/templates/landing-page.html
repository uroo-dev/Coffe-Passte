<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .blur-backdrop {
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);

        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      @keyframes slow-zoom {
        from { transform: scale(1.0); }
        to { transform: scale(1.1); }
      }
      .animate-slow-zoom {
        animation: slow-zoom 20s infinite alternate ease-in-out;
      }

<body class="bg-surface font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed overflow-hidden">
<!-- Background Layer -->
<div class="fixed inset-0 z-0 overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center animate-slow-zoom" data-alt="A luxurious, high-end restaurant interior captured with a shallow depth of field. Warm, ambient glowing lights reflect off polished mahogany tables and crystal glassware. The background is softly blurred to create a cozy, intimate gastronomy atmosphere. Elegant architectural details and lush indoor plants are visible in the bokeh. The scene is dominated by warm amber tones and deep shadows, evoking a sense of premium comfort and modern culinary excellence." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDhsX3FLEp-KNkl8LRzzdh-Cbc97XXh4p5zYMTXiLKgemmpHkunIxuezB-wTGBkLebn9pUXG_u4OZOlG86WE2kBa_HB7EH5J1lBL3gb_eYfKZs9SSlrYHoKJFLaDOG9d3SyUCi2ND3Q-gsEDFOTS-DyLSjtakSijWCjeYCEqcpu1mij7Lex7j2aGjuIHIrvnwmQE5E1xzjQfqYjxaJGvCkoCFc2yuaXdyG7mxW_I_gFuU60nwkCW1Utc9CpQD39l2bpW-bofA2By8Es')">
</div>
<div class="absolute inset-0 bg-gradient-to-t from-on-surface/80 via-on-surface/20 to-transparent"></div>
</div>
<!-- Top Navigation Anchor -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-margin py-stack-md bg-surface/10 backdrop-blur-md">
<div class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-white drop-shadow-md">
            Modern Gastronomy
        </div>
<button class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-white backdrop-blur-md">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 h-screen w-full flex flex-col items-center justify-end pb-24 px-container-margin">
<!-- Table Identifier Card (Bento-style element) -->
<div class="glass-card rounded-xl px-6 py-3 mb-8 flex items-center gap-3 self-start animate-fade-in shadow-xl">
<div class="bg-primary-container text-white w-12 h-12 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-2xl" data-icon="restaurant">restaurant</span>
</div>
<div>
<p class="font-label-md text-label-md text-primary opacity-80">Nomor Meja</p>
<h2 class="font-headline-lg text-headline-lg text-on-surface leading-none">Meja 12</h2>
</div>
</div>
<!-- Welcome Message & Primary Action -->
<div class="w-full text-left space-y-6">
<h1 class="font-headline-xl text-headline-xl text-white drop-shadow-lg max-w-[280px]">
                Selamat Datang di Modern Gastronomy
            </h1>
<p class="font-body-md text-body-md text-white/90 max-w-sm leading-relaxed">
                Nikmati pengalaman kuliner terbaik yang menggabungkan tradisi dan teknik modern langsung dari genggaman Anda.
            </p>
<div class="flex flex-col gap-4 w-full">
<!-- Large Inviting Button -->
<button class="group relative flex items-center justify-between bg-primary-container text-on-primary-fixed-variant font-headline-lg-mobile text-headline-lg-mobile px-8 py-5 rounded-full shadow-2xl transition-all duration-200 active:scale-95 overflow-hidden" onclick="this.classList.add('scale-95')">
<span class="relative z-10 text-white font-bold">Lihat Menu &amp; Pesan</span>
<span class="material-symbols-outlined relative z-10 text-white transition-transform group-hover:translate-x-2" data-icon="arrow_forward">arrow_forward</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<!-- Secondary Actions -->
<div class="grid grid-cols-2 gap-4">
<button class="glass-card flex items-center justify-center gap-2 py-4 rounded-xl text-on-surface font-label-md text-label-md shadow-lg transition-transform active:scale-95">
<span class="material-symbols-outlined" data-icon="person_raised_hand">person_raised_hand</span>
<span>Panggil Pelayan</span>
</button>
<button class="glass-card flex items-center justify-center gap-2 py-4 rounded-xl text-on-surface font-label-md text-label-md shadow-lg transition-transform active:scale-95">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span>Pesanan Saya</span>
</button>
</div>
</div>
</div>
</main>
<!-- Visual Embellishment: Animated Bottom Fade -->
<div class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-black/40 to-transparent pointer-events-none z-0"></div>
<!-- Minimalist Drawer Simulation (Background Micro-interaction) -->
<script>
        // Micro-interactions for button presses
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.97)';
            });
            btn.addEventListener('touchend', function() {
                this.style.transform = 'scale(1)';
            });
        });

        // Subtle parallax effect on move
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.animate-slow-zoom').style.transform = `scale(1.05) translate(${moveX}px, ${moveY}px)`;
        });
    </script>
